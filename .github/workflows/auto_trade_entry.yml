name: Auto Trade Entry (09:00 KST)

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 09:00 KST (UTC 00:00), 월~금
    - cron: '5 0 * * 1-5'   # 09:05 KST — 지연 백업
    - cron: '10 0 * * 1-5'  # 09:10 KST — 2차 백업
  workflow_dispatch:

permissions:
  contents: write

jobs:
  entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto trader entry
        env:
          KIS_MOCK_APP_KEY: ${{ secrets.KIS_MOCK_APP_KEY }}
          KIS_MOCK_APP_SECRET: ${{ secrets.KIS_MOCK_APP_SECRET }}
          KIS_MOCK_ACCOUNT_NO: ${{ secrets.KIS_MOCK_ACCOUNT_NO }}
          STOCK1_PRIVATE_PAT: ${{ secrets.STOCK1_PRIVATE_PAT }}
          AUTO_TRADE_MODE: mock
        run: python auto_trader.py entry
