name: Auto Trade Attack (09:00 KST)

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 09:00 KST (UTC 00:00), 월~금
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run attack (장초반 공략 매수)
        env:
          KIS_MOCK_APP_KEY: ${{ secrets.KIS_MOCK_APP_KEY }}
          KIS_MOCK_APP_SECRET: ${{ secrets.KIS_MOCK_APP_SECRET }}
          KIS_MOCK_ACCOUNT_NO: ${{ secrets.KIS_MOCK_ACCOUNT_NO }}
          STOCK1_PRIVATE_PAT: ${{ secrets.STOCK1_PRIVATE_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTO_TRADE_MODE: mock
        run: python auto_trader.py attack
