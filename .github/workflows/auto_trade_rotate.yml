name: Auto Trade Rotate (09:30 KST)

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 09:30 KST (UTC 00:30), 월~금
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run rotate (장초반 강제탈출 + 눌림 진입)
        env:
          KIS_MOCK_APP_KEY: ${{ secrets.KIS_MOCK_APP_KEY }}
          KIS_MOCK_APP_SECRET: ${{ secrets.KIS_MOCK_APP_SECRET }}
          KIS_MOCK_ACCOUNT_NO: ${{ secrets.KIS_MOCK_ACCOUNT_NO }}
          STOCK1_PRIVATE_PAT: ${{ secrets.STOCK1_PRIVATE_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTO_TRADE_MODE: mock
        run: python auto_trader.py rotate
