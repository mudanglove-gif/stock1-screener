name: Daily Stock Screener

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 매일 07:00 UTC = 16:00 KST (월~금)
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name "Stock Screener Bot"
          git config user.email "bot@stock1.app"
          git add docs/signals.json docs/attention_history.json
          git diff --staged --quiet || git commit -m "update signals $(date +'%Y-%m-%d %H:%M')"
          git push
