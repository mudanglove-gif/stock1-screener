name: After-Market Day Trade Check

on:
  schedule:
    - cron: '10 11 * * 1-5'  # 매일 20:10 KST (UTC 11:10), 월~금
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run after-market checker
        run: python aftermarket_checker.py

      - name: Commit results
        run: |
          git config user.name "Stock Screener Bot"
          git config user.email "bot@stock1.app"
          git add docs/signals.json
          git diff --staged --quiet || git commit -m "update after-market data $(date +'%Y-%m-%d %H:%M')"
          git push
