name: Stock Optimizer (20:30 KST)

on:
  schedule:
    - cron: '30 11 * * 1-5'  # 매일 20:30 KST (UTC 11:30), 월~금 (시간외 체크 후 20분 여유)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock optimizer
        run: python stock_optimizer.py

      - name: Commit results
        run: |
          git config user.name "Stock Optimizer Bot"
          git config user.email "bot@stock1.app"
          git add docs/signals.json
          git diff --staged --quiet || git commit -m "update optimized params $(date +'%Y-%m-%d %H:%M')"
          git push
