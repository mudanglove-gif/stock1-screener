name: Auto Trade Exit (15:20 KST)

on:
  schedule:
    - cron: '20 6 * * 1-5'  # 매일 15:20 KST (UTC 06:20), 월~금
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto trader exit
        env:
          KIS_MOCK_APP_KEY: ${{ secrets.KIS_MOCK_APP_KEY }}
          KIS_MOCK_APP_SECRET: ${{ secrets.KIS_MOCK_APP_SECRET }}
          KIS_MOCK_ACCOUNT_NO: ${{ secrets.KIS_MOCK_ACCOUNT_NO }}
          STOCK1_PRIVATE_PAT: ${{ secrets.STOCK1_PRIVATE_PAT }}
          AUTO_TRADE_MODE: mock
        run: python auto_trader.py exit
